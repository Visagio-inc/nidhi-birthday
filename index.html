<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Nidhi 🎉</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
    overflow: hidden;
}

/* INTRO SCREEN */
#intro {
    position: fixed;
    width: 100%;
    height: 100%;
    background: #ff6f91;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    z-index: 10;
}

#intro button {
    padding: 15px 30px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff6f91;
    font-size: 18px;
    cursor: pointer;
}

/* MAIN CONTENT */
#main {
    display: none;
}

h1 {
    margin-top: 40px;
    color: white;
}

/* SLIDESHOW */
.slideshow img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    object-fit: cover;
    border: 4px solid white;
    margin-top: 20px;
}

/* BUTTONS */
button {
    margin: 10px;
    padding: 12px 20px;
    border-radius: 25px;
    border: none;
    cursor: pointer;
}

/* CARDS */
.section {
    display: none;
    color: white;
}

.card {
    background: rgba(255,255,255,0.2);
    margin: 10px auto;
    padding: 10px;
    border-radius: 15px;
    width: 80%;
}

/* HEARTS */
.heart {
    position: fixed;
    bottom: -20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    to { transform: translateY(-100vh); }
}

/* FIREWORK */
.fire {
    position: absolute;
    font-size: 20px;
    animation: boom 1s forwards;
}

@keyframes boom {
    to {
        transform: translateY(-80px) scale(2);
        opacity: 0;
    }
}
</style>
</head>

<body onclick="firework(event)">

<!-- INTRO -->
<div id="intro">
    <h2>I have something for you 🎁</h2>
    <button onclick="start()">Open Gift</button>
</div>

<!-- MAIN -->
<div id="main">

<h1>Happy Birthday Nidhi 🎉</h1>

<div class="slideshow">
    <img id="slide" src="nidhi.jpg">
</div>

<br>

<button onclick="show('admire')">10 things I admire</button>
<button onclick="show('timeline')">Memories</button>
<button onclick="secretCheck()">Only if smiling 😊</button>

<div id="admire" class="section">
    <div class="card">1. Ninte Kindness😌</div>
    <div class="card">2. Innocent Smile😁</div>
    <div class="card">3. Your way of talking😝</div>
    <div class="card">4. Challi🤣</div>
    <div class="card">10. Just being YOU 💖</div>
</div>

<div id="timeline" class="section">
    <div class="card">✨ Tour inu vech aa late night talkss😗...</div>
    <div class="card">✨ Ninte cringe dialogues</div>
    <div class="card">✨ First day english book choich mindiyath</div>
    <div class="card">✨ Today, on your bithday</div>
</div>

<div id="secret" class="section">
    <h2>For you 💌</h2>
    <p id="type"></p>
</div>

</div>

<!-- AUDIO -->
<audio id="bgm" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<script>

/* START */
function start() {
    document.getElementById("intro").style.display = "none";
    document.getElementById("main").style.display = "block";
    document.getElementById("bgm").play();
}

/* SLIDESHOW */
let images = ["nidhi.jpg","photo2.jpg","photo1.jpg"];
let index = 0;

setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("slide").src = images[index];
}, 2000);

/* SHOW SECTION */
function show(id){
    document.querySelectorAll('.section').forEach(s => s.style.display='none');
    document.getElementById(id).style.display='block';
}

/* SECRET */
function secretCheck(){
    if(confirm("Are you smiling? 😊")){
        show('secret');
        typeText();
    }
}

/* TYPE EFFECT */
let message = "Don't Forget Me...😌🙌💖";
let i = 0;

function typeText(){
    let el = document.getElementById("type");
    el.innerHTML="";
    i=0;
    let interval=setInterval(()=>{
        if(i<message.length){
            el.innerHTML+=message[i];
            i++;
        } else clearInterval(interval);
    },40);
}

/* HEARTS */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="💖";
    h.style.left=Math.random()*100+"vw";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
},400);

/* FIREWORK */
function firework(e){
    for(let i=0;i<6;i++){
        let f=document.createElement("div");
        f.className="fire";
        f.innerHTML="✨";
        f.style.left=e.pageX+"px";
        f.style.top=e.pageY+"px";
        document.body.appendChild(f);
        setTimeout(()=>f.remove(),1000);
    }
}

</script>

</body>
</html>
