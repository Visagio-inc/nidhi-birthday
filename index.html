<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Nidhi 🎉</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    text-align: center;
    overflow-x: hidden;
}

h1 {
    margin-top: 50px;
    font-size: 3em;
    color: white;
}

/* IMAGE STYLE */
img {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    margin-top: 20px;
    object-fit: cover;
    border: 4px solid white;
    box-shadow: 0 0 20px rgba(0,0,0,0.2);
}

button {
    margin: 15px;
    padding: 15px 25px;
    border: none;
    border-radius: 25px;
    background: white;
    color: #ff6f91;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #ffe0e9;
}

.section {
    display: none;
    margin-top: 30px;
    padding: 20px;
    color: white;
}

.card {
    background: rgba(255,255,255,0.2);
    padding: 15px;
    margin: 10px auto;
    border-radius: 15px;
    width: 80%;
}

/* Floating hearts */
.heart {
    position: fixed;
    bottom: -20px;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    0% {transform: translateY(0);}
    100% {transform: translateY(-100vh);}
}
</style>
</head>

<body>

<h1>Happy Birthday Nidhi 🎉</h1>

<!-- IMAGE HERE -->
<img src="nidhi.jpg" alt="Nidhi">

<br>

<button onclick="showSection('admire')">10 things I admire about you</button>
<button onclick="showSection('timeline')">Our memories</button>
<button onclick="checkSmile()">Click only if you're smiling 😊</button>

<div id="admire" class="section">
    <div class="card">1. Ninte Kindnes😌s</div>
    <div class="card">2. Innocent Smile😁</div>
    <div class="card">3. Your way of talking😝</div>
    <div class="card">4. Challi🤣</div> 
    <div class="card">10. Just being YOU 💖</div>
</div>

<div id="timeline" class="section">
    <div class="card">✨School touril vech mindiyath...</div>
    <div class="card">✨ Ninte cringe dialogues</div>
    <div class="card">✨ First day english book choich mindiyath</div>
    <div class="card">✨ Today, on your bithday</div>
</div>

<div id="secret" class="section">
    <h2>This is only for you 💌</h2>
    <p id="secretMsg">Don't forget me😌</p>
</div>

<script>
function showSection(id) {
    document.querySelectorAll('.section').forEach(sec => sec.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function checkSmile() {
    let answer = confirm("Are you smiling right now? 😊");
    if (answer) {
        showSection('secret');
    } else {
        alert("Come back when you are 😊");
    }
}

/* Floating hearts */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}, 500);
</script>

</body>
</html>
